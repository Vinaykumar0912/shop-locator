<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Verify OTP</title>
  <style>
    body {
      font-family: Arial;
      background: #0b2c5d;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: #fff;
      padding: 25px;
      border-radius: 8px;
      width: 320px;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }
    button {
      background: #1a73e8;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="box">
    <h3>Verify OTP</h3>

   <form id="verify-form">
  <input type="email" id="email" readonly />
  <input type="text" id="otp" placeholder="Enter OTP" />
  <button type="submit">Verify OTP</button>
</form>

<script type="module" src="customerverify-otp.js"></script>
  </div>
</html>
